---
tasks:
  ubuntu2404:
    name: "Buildkite API auth reachability proof"
    platform: ubuntu2404
    shell_commands:
      - |
        python3 - <<'PY'
        import hashlib
        import bazelci

        client = bazelci.BuildkiteClient(
            org="bazel",
            pipeline="bazel-bazel-github-presubmit",
        )
        token = client._token
        print("TOKEN_DECRYPTED_REDACTED=1")
        print("TOKEN_LEN=%d" % len(token))
        print("TOKEN_SHA256_PREFIX=%s" % hashlib.sha256(token.encode()).hexdigest()[:12])

        info = client.get_pipeline_info()
        print("API_AUTH_OK=bazel/%s" % info.get("slug"))
        PY
