---
check_docs: 0
tasks:
  windows:
    shards: 1
    setup:
      - mkdir C:\b
      - mklink /J C:\b\bazeltest_external %OUTPUT_BASE:/=\%\external
    build_flags:
      - "--config=ci-windows"
    test_flags:
      - "--config=ci-windows"
      # We need to keep --test_tag_filters here for the bazel-diff integration.
      - "--test_tag_filters=-no_presubmit,-no_windows,-slow"
    test_targets:
      - "//src/test/shell/integration:target_pattern_file_test"
      - "//src/test/shell/integration:ui_test"
    include_json_profile:
      - build
      - test
