---
check_docs: 1
tasks:
  ubuntu2404:
    shell_commands:
      - rm -rf $HOME/bazeltest
      - mkdir $HOME/bazeltest
      - if [ -n "${UPDATE_BAZEL_LOCK_FILE:-}" ]; then bazel mod deps --lockfile_mode=update; fi
    build_flags:
      - "--config=ci-linux"
    build_targets:
      - "//src:bazel"
    test_flags:
      - "--config=ci-linux"
      - "--test_tag_filters=-no_presubmit"
    test_targets:
      - "//..."
    include_json_profile:
      - build
      - test
  macos:
    shell_commands:
      - rm -rf $HOME/bazeltest
      - mkdir $HOME/bazeltest
      - ln -sf $OUTPUT_BASE/external $HOME/bazeltest/external
      - if [ -n "${UPDATE_BAZEL_LOCK_FILE:-}" ]; then bazel mod deps --lockfile_mode=update; fi
    build_flags:
      - "--config=ci-macos"
    build_targets:
      - "//src:bazel"
    test_flags:
      - "--config=ci-macos"
      # Fine tune the number of test jobs running in parallel to avoid timeout
      - "--local_test_jobs=2"
    include_json_profile:
      - build
      - test

