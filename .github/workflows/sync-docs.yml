name: Documentation Sync

on:
  workflow_dispatch: # Allows manual triggering
  # Add your schedule or push triggers here

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: bazel_src

      - name: "🚀 Create Pull Request"
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # 1. Enter the directory
          cd bazel_src || { echo "❌ Directory not found"; exit 1; }

          # 2. Safety check for PAT
          if [[ -z "$PAT" ]]; then
            echo "❌ ERROR: PAT_TOKEN is empty! Cannot create PR."
            exit 1
          fi

          # 3. Check for changes
          # We check site/en and docs specifically as per your requirements
          if [[ -z $(git status --short site/en/ docs/) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          echo "Changes detected! Preparing PR..."
          
          # 4. Setup Git Identity
          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"

          # 5. Create branch and commit
          BRANCH_NAME="auto-doc-sync-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git add site/en/ docs/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"

          # 6. Push to your fork 
          # Note: The branch name must be on the same line as the URL
          git push -f "https://deepalak56:${PAT}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          # 7. Create the Pull Request against the upstream master branch
          gh pr create \
            --repo bazelbuild/bazel \
            --base master \
            --head "deepalak56:$BRANCH_NAME" \
            --title "Docs: Sync RELNOTES to Documentation" \
            --body "This PR was automatically generated by the Gemini AI Relnotes Bot."
