name: Sync RELNOTES to Documentation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: self-hosted
    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          fetch-depth: 1000

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch 15 Days of Commits
        run: |
          cd bazel_src
          git log --since="1 day ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater (Secure Mode)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Use absolute path or ensure it's in PATH
          gtech-launch python3 action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          # Use the PAT for everything to ensure cross-repo permissions
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          cd bazel_src
          
          # Check if changes exist
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          echo "Changes detected! Preparing PR..."
          BRANCH_NAME="auto-doc-sync-$(date +%s)"
          
          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"
          
          # Force a new branch in case the self-hosted runner has state
          git checkout -b "$BRANCH_NAME"
          git add site/en/ docs/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"

          # FIX: Branch name must be on the same line or use a backslash
          git push -f "https://x-access-token:${PAT}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          unset GH_TOKEN
          unset GITHUB_TOKEN
          
          # FIX: Authenticate the CLI using the token before creating PR
          echo "$PAT" | gh auth login --with-token

          # Create PR (Targeting master as per Bazel standards)
          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "This PR was automatically generated by the Gemini AI Relnotes Bot." \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base "master"
