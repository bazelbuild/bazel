name: Sync RELNOTES to Documentation

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  update-docs:
    runs-on: self-hosted
    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          fetch-depth: 1000

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch Recent Commits
        run: |
          cd bazel_src
          # Extracts hashes and bodies for the last 2 days
          git log --since="2 days ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Runs the python script from your action repo
          python3 action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cd bazel_src
          
          # 1. Safety Check: Only proceed if files actually changed
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          # 2. Gather context for the PR description
          if [ -f ../processed_commits.txt ]; then
            COMMIT_DETAILS=$(cat ../processed_commits.txt)
          else
            COMMIT_DETAILS="Automated updates based on recent RELNOTES."
          fi

          echo "Changes detected! Preparing PR..."
          BRANCH_NAME="auto-doc-sync-$(date +%s)"
          
          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"
          
          # 3. Commit and Push to Fork
          git checkout -b "$BRANCH_NAME"
          git add site/en/ docs/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          # 4. Construct PR Body
          PR_BODY=$(cat <<EOF
          ### Description
          Automated documentation synchronization. This PR maps recent Bazel release notes to the 
          corresponding DevSite (.md) and Mintlify (.mdx) documentation files using Gemini AI.

          **Commits processed in this run:**
          $COMMIT_DETAILS

          ### Motivation
          Ensures technical documentation remains in sync with code changes automatically.

          ### Checklist
          - [x] I have updated the documentation (if applicable).

          ### Release Notes
          RELNOTES: None
          EOF
          )

          # 5. Create PR against Upstream
          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "$PR_BODY" \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base "master"
