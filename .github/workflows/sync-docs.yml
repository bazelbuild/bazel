name: Sync RELNOTES to Documentation

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: self-hosted
    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          fetch-depth: 1000

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch 15 Days of Commits
        run: |
          cd bazel_src
          git log --since="10 days ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater (Secure Mode)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Use absolute path or ensure it's in PATH
          gtech-launch python3 action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          cd bazel_src
          
          # 1. Check if changes exist
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          echo "Changes detected! Preparing PR..."
          
          # 2. Setup Variables
          BRANCH_NAME="auto-doc-sync-$(date +%s)"
          COMMIT_DETAILS=$(cat ../weekly_notes.txt)
          
          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"
          
          # 3. Commit and Push
          git checkout -b "$BRANCH_NAME"
          git add site/en/ docs/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"
          
          # Use GH_TOKEN for authentication in the push URL
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          # 4. Construct PR Body
          # We use a quoted heredoc 'EOF' to prevent shell expansion issues
          PR_BODY=$(cat <<EOF
          Description:
          Automated documentation synchronization. This PR updates recent Bazel release notes to the
          corresponding DevSite and Mintlify documentation files.
          
          Motivation:
          Ensures technical documentation remains in sync with code changes automatically.
          
          Commits Processed in this run:
          $COMMIT_DETAILS
          
          Build API Changes:
          No
          
          Checklist:
          - [x] I have updated the documentation (if applicable).
          
          Release Notes:
          RELNOTES: None
          EOF
          )

          # 5. Create PR (Targeting master as per Bazel standards)
          # 'gh' uses GH_TOKEN automatically if it is set in the environment
          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "$PR_BODY" \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base "master"
