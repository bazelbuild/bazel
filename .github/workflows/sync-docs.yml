name: Sync RELNOTES to Documentation

on:
  # Run automatically every day at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  update-docs:
    # This triggers your e2-standard VM instance
    runs-on: self-hosted

    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          # Fetch enough history to cover the last 15 days of commits
          fetch-depth: 1000

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch 15 Days of Commits
        run: |
          cd bazel_src
          git log --since="15 days ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater (Secure Mode)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Ensure gtech-launch is in the system PATH or use absolute path
          gtech-launch python3 action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          cd bazel_src

          # Check if changes exist
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          echo "Changes detected! Preparing PR..."
          BRANCH_NAME="auto-doc-sync-$(date +%s)"

          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add site/en/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"

          # Use the token securely for the push
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          # Create PR (Added missing closing quote and fixed head syntax)
          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "This PR was automatically generated by the Gemini AI Relnotes Bot." \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base "main"
