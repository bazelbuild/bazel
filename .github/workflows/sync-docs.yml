name: Sync RELNOTES to Documentation

on:
  schedule:
    - cron: '0 0 * * 5' # Runs every Friday at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-docs:
    runs-on: self-hosted
    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          fetch-depth: 1000

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch Recent Commits
        run: |
          cd bazel_src
          # Combined the redirection to a single line to prevent syntax errors
          git log --since="10 days ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python3 action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          cd bazel_src

          # 1. Safety Check
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          # 2. Gather context
          if [ -f ../pr_report.md ]; then
            REPORT_CONTENT=$(cat ../pr_report.md)
          else
            REPORT_CONTENT="Automated updates based on recent RELNOTES."
          fi

          echo "Changes detected! Preparing PR..."
          BRANCH_NAME="auto-doc-sync-$(date +%s)"

          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"

          # 3. Commit and Push
          git checkout -b "$BRANCH_NAME"
          git add site/en/ docs/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"

          # Fixed: Ensure the push URL and branch name are on one line or escaped correctly
          git push -f "https://deepalak56:${PAT}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          # 4. Construct PR Body
          # CRITICAL: The closing EOF must be at the very start of the line (no spaces)
          PR_BODY=$(cat <<EOF
          ### Description
          Automated documentation synchronization. This PR maps recent Bazel release notes to the corresponding DevSite (.md) and Mintlify (.mdx) documentation files using Gemini AI.

          $REPORT_CONTENT

          ### Motivation
          Ensures technical documentation remains in sync with code changes automatically.

          ### Build API Changes
          No

          ### Checklist
          - [x] I have updated the documentation (if applicable).

          ### Release Notes
          RELNOTES: None
          EOF
          )

          # 5. Authenticate and Create PR
          # Using the GH_TOKEN env var is the cleanest way to auth 'gh'
          export GH_TOKEN=$PAT
          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "$PR_BODY" \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base "master"
