name: Sync RELNOTES to Documentation

on:
  schedule:
    - cron: '0 0 * * 5' # Runs every Friday at midnight UTC
  workflow_dispatch: # Allows manual triggering

jobs:
  update-docs:
    runs-on: self-hosted
    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          fetch-depth: 1000

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch Recent Commits
        run: |
          cd bazel_src
          # Fixed line break syntax for output redirection
          git log --since="15 days ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater (Secure Mode)
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # The launcher automatically pulls the GEMINI_API_KEY from Secret Manager
          gtech-launch python3 action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          cd bazel_src

          # 1. Safety Check: Only proceed if files actually changed
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi

          # 2. Gather context for the PR description
          if [ -f ../processed_commits.txt ]; then
            COMMIT_DETAILS=$(cat ../processed_commits.txt)
          else
            COMMIT_DETAILS="Automated updates based on recent RELNOTES."
          fi

          echo "Changes detected! Preparing PR..."
          BRANCH_NAME="auto-doc-sync-$(date +%s)"

          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"

          # 3. Commit and Push to Fork
          git checkout -b "$BRANCH_NAME"
          git add site/en/ docs/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"

          # FIX: Ensure the URL and branch are parsed as a single command line
          git push -f "https://deepalak56:${PAT}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

          # 4. Construct PR Body using heredoc
          # CRITICAL: Do not indent the text inside EOF if you want clean formatting in the PR
          PR_BODY=$(cat <<EOF
          ### Description
          Automated documentation synchronization. This PR maps recent Bazel release notes to the corresponding DevSite (.md) and Mintlify (.mdx) documentation files using Gemini AI.

          **Commits processed in this run:**
          $COMMIT_DETAILS

          ### Motivation
          Ensures technical documentation remains in sync with code changes automatically.

          ### Build API Changes
          No

          ### Checklist
          - [x] I have updated the documentation (if applicable).

          ### Release Notes
          RELNOTES: None
          EOF
          )

          # 5. Create PR against Upstream
          # Explicit login to handle GraphQL scope issues on self-hosted runners
          unset GH_TOKEN
          unset GITHUB_TOKEN
          echo "$PAT" | gh auth login --with-token

          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "$PR_BODY" \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base "master"
