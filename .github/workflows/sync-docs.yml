name: Sync RELNOTES to Documentation

on:
  # Run automatically every day at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  update-docs:
    # Use the self-hosted runner configured for your project
    runs-on: self-hosted
    
    steps:
      - name: 🛎️ Checkout the Action repository
        uses: actions/checkout@v4
        with:
          path: action_repo

      - name: 🛎️ Checkout Bazel Source (Upstream)
        uses: actions/checkout@v4
        with:
          repository: bazelbuild/bazel
          path: bazel_src
          # Fetch enough history to cover the last 15 days of commits
          fetch-depth: 1000 

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 📦 Install Dependencies
        run: |
          pip install google-generativeai

      - name: 🔍 Fetch 15 Days of Commits
        run: |
          cd bazel_src
          # Get all commits from the last 15 days, format them with our delimiter
          git log --since="15 days ago" --format="COMMIT_DELIMITER%n%H%n%s%n%b" > ../weekly_notes.txt

      - name: 🧠 Run Gemini Doc Updater
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # The GitHub CLI automatically uses this token for the gh search commands in the script
          GH_TOKEN: ${{ github.token }}
        run: |
          python action_repo/sync_relnotes.py

      - name: 🚀 Create Pull Request
        env:
          # We use a Personal Access Token (PAT) because the default github.token 
          # often lacks permission to push to a different repository or trigger workflows.
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          cd bazel_src
          
          # Check if Gemini actually changed any files
          if [[ -z $(git status -s) ]]; then
            echo "No documentation changes detected. Skipping PR."
            exit 0
          fi
          
          echo "Changes detected! Preparing PR..."
          
          BRANCH_NAME="auto-doc-sync-$(date +%s)"
          
          # Configure Git Identity
          git config user.name "deepalak56"
          git config user.email "deepalak56@users.noreply.github.com"
          
          # Branch and commit
          git checkout -b $BRANCH_NAME
          git add site/en/
          git commit -m "docs: Automated documentation sync from recent RELNOTES"
          
          # Push the new branch to YOUR fork (bazel_deepa)
          # We use the token in the URL to authenticate the push
          git push -f https://$GH_TOKEN@github.com/deepalak56/bazel_deepa.git $BRANCH_NAME
          
          # Use GitHub CLI to create the PR against the main bazelbuild/bazel repo
          gh pr create --repo bazelbuild/bazel \
                       --title "Docs: Sync RELNOTES to Documentation" \
                       --body "This PR was automatically generated by the Gemini AI Relnotes Bot." \
                       --head "deepalak56:$BRANCH_NAME" \
                       --base master
