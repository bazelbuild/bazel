- name: 🚀 Create Pull Request
  env:
        PAT: ${{ secrets.PAT_TOKEN }}
        # Setting GITHUB_TOKEN directly allows the 'gh' CLI to authenticate automatically
        GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        cd bazel_src

        # Safety check
        if [[ -z "$PAT" ]]; then
          echo "❌ ERROR: PAT_TOKEN is empty!"
          exit 1
        fi

        # Check if changes exist
        if [[ -z $(git status -s) ]]; then
          echo "No documentation changes detected. Skipping PR."
          exit 0
        fi

        echo "Changes detected! Preparing PR..."
        BRANCH_NAME="auto-doc-sync-$(date +%s)"

        git config user.name "deepalak56"
        git config user.email "deepalak56@users.noreply.github.com"

        git checkout -b "$BRANCH_NAME"
        git add site/en/ docs/
        git commit -m "docs: Automated documentation sync from recent RELNOTES"

        # Push using the PAT in the URL for auth
        # Note: Fixed the line break here
        git push -f "https://deepalak56:${PAT}@github.com/deepalak56/bazel_deepa.git" "$BRANCH_NAME"

        # Create PR using the GitHub CLI
        # Fixed the stray backslashes and formatting here
        gh pr create --repo bazelbuild/bazel \
                     --base master \
                     --title "Docs: Sync RELNOTES to Documentation" \
                     --body "This PR was automatically generated by the Gemini AI Relnotes Bot." \
                     --head "deepalak56:$BRANCH_NAME"
